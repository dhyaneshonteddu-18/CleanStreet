<div class="dashboard-container">

  <div class="dashboard-card">

    <div class="header">

      <div>
        <h1>
          Welcome,
          {{ user?.name }} 👋
        </h1>

        <p class="email">
          {{ user?.email }}
        </p>
      </div>

      <button
        class="logout-btn"
        (click)="logout()"
      >
        Logout
      </button>


    </div>

    <div class="stats-grid">

      <div class="stat-card total">

        <div class="icon">
          📋
        </div>

        <h2>
          {{ totalIssues }}
        </h2>

        <p>
          Total Complaints
        </p>

      </div>

      <div class="stat-card pending">

        <div class="icon">
          ⏳
        </div>

        <h2>
          {{ pending }}
        </h2>

        <p>
          Pending
        </p>

      </div>

      <div class="stat-card resolved">

        <div class="icon">
          ✅
        </div>

        <h2>
          {{ resolved }}
        </h2>

        <p>
          Resolved
        </p>

      </div>

    </div>

    <div class="actions">

      <button
        (click)="goToReport()"
      >
        🚨 Report Issue
      </button>

      <button
        (click)="goToComplaints()"
      >
        📄 View Complaints
      </button>

      <button
        (click)="goToProfile()"
      >
        👤 Profile
      </button>

      <button *ngIf="isAdmin"
          (click)="goToAdmin()"
        >
        🛠 Admin Dashboard
        </button>

    </div>

  </div>

</div>
