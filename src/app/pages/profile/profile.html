<div class="profile-container">

  <div class="profile-card">

    <div class="avatar">
      👤
    </div>

    <h1>
      User Profile
    </h1>

    <div class="info">

      <p>
        <strong>
          Name:
        </strong>

        {{ user?.name }}
      </p>

      <p>
        <strong>
          Username:
        </strong>

        {{ user?.username }}
      </p>

      <p>
        <strong>
          Email:
        </strong>

        {{ user?.email }}
      </p>

      <p>
        <strong>
          Phone:
        </strong>

        {{ user?.phone }}
      </p>

    </div>

  </div>

</div>
